<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background gelap -->
  <circle cx="50" cy="50" r="50" fill="#070b14"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#00aaff" stroke-width="3"/>
  <!-- Inner dot -->
  <circle cx="50" cy="50" r="10" fill="#00aaff"/>
  <!-- Cross lines -->
  <line x1="50" y1="15" x2="50" y2="35" stroke="#00aaff" stroke-width="2"/>
  <line x1="50" y1="65" x2="50" y2="85" stroke="#00aaff" stroke-width="2"/>
  <line x1="15" y1="50" x2="35" y2="50" stroke="#00aaff" stroke-width="2"/>
  <line x1="65" y1="50" x2="85" y2="50" stroke="#00aaff" stroke-width="2"/>
</svg>